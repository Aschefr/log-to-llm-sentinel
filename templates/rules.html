{% extends "base.html" %}

{% block title %}Règles - Log Sentinel{% endblock %}

{% block content %}
<div class="rules-page">
    <div class="page-header">
        <h1>Gestion des Règles</h1>
        <button id="add-rule-btn" class="btn btn-primary">+ Nouvelle règle</button>
    </div>

    <div id="rules-list" class="rules-list">
        <div class="loading">Chargement des règles...</div>
    </div>

    <!-- Modal ajout/édition -->
    <div id="rule-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Nouvelle règle</h2>
                <button id="close-modal" class="btn-close">&times;</button>
            </div>
            <form id="rule-form">
                <input type="hidden" id="rule-id">
                <div class="form-group">
                    <label for="rule-name">Nom</label>
                    <input type="text" id="rule-name" required placeholder="Nom de la règle">
                </div>
                <div class="form-group">
                    <label for="rule-path">Chemin du fichier log</label>
                    <input type="text" id="rule-path" required placeholder="/logs/app.log">
                </div>
                <div class="form-group">
                    <label for="rule-keywords">Mots-clés (séparés par des virgules)</label>
                    <input type="text" id="rule-keywords" placeholder="error, exception, fatal">
                </div>
                <div class="form-group">
                    <label for="rule-context">Contexte application</label>
                    <textarea id="rule-context" rows="3" placeholder="Description du contexte..."></textarea>
                </div>
                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="rule-enabled" checked>
                        Activée
                    </label>
                    <label>
                        <input type="checkbox" id="rule-notify" checked>
                        Notifier sur correspondance
                    </label>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                    <button type="button" id="cancel-rule" class="btn btn-secondary">Annuler</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/rules.js"></script>
{% endblock %}
