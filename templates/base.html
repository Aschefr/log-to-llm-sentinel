<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Log to LLM Sentinel{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css?v=4">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🔍 Log to LLM Sentinel</div>
        <div class="nav-links">
            <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
            <a href="/rules" class="{% if request.url.path == '/rules' %}active{% endif %}">Règles</a>
            <a href="/monitor" class="{% if request.url.path == '/monitor' %}active{% endif %}">Monitor</a>
            <a href="/config" class="{% if request.url.path == '/config' %}active{% endif %}">Configuration</a>
        </div>
        <div class="nav-stats" id="nav-system-stats">
            <div class="stat-item" title="Utilisation CPU (App / Système)">
                <span class="stat-icon">📊</span>
                <span id="stat-cpu">--%</span>
            </div>
            <div class="stat-item" title="Utilisation RAM (App)">
                <span class="stat-icon">💾</span>
                <span id="stat-ram">-- MB</span>
            </div>
            <div class="stat-item" title="Uptime">
                <span class="stat-icon">⏱️</span>
                <span id="stat-uptime">--</span>
            </div>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/js/common.js?v=3"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
