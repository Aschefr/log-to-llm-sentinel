<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Log to LLM Sentinel{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🔍 Log to LLM Sentinel</div>
        <div class="nav-links">
            <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
            <a href="/rules" class="{% if request.url.path == '/rules' %}active{% endif %}">Règles</a>
            <a href="/config" class="{% if request.url.path == '/config' %}active{% endif %}">Configuration</a>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/js/common.js?v=2"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
