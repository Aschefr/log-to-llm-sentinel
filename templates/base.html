<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Log to LLM Sentinel{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css?v=10">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        (function() {
            var theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <style>
        /* ── Language Switcher ── */
        .lang-switcher-wrapper { position: relative; }
        .lang-btn {
            display: flex; align-items: center; gap: 0.35rem;
            background: transparent; border: 1px solid var(--border);
            color: var(--text-secondary); border-radius: 0.4rem;
            padding: 0.3rem 0.6rem; cursor: pointer; font-size: 0.8rem;
            transition: border-color 0.2s, color 0.2s;
        }
        .lang-btn:hover { border-color: var(--accent); color: var(--text-primary); }
        .lang-code { font-weight: 600; letter-spacing: 0.05em; }
        .lang-dropdown {
            display: none; position: absolute; top: calc(100% + 6px); right: 0;
            background: var(--bg-primary); border: 1px solid var(--border);
            border-radius: 0.5rem; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            min-width: 140px; z-index: 1000; overflow: hidden;
        }
        .lang-dropdown.open { display: block; }
        .lang-option {
            display: flex; align-items: center; gap: 0.5rem;
            width: 100%; padding: 0.6rem 1rem; background: transparent;
            border: none; color: var(--text-secondary); cursor: pointer;
            font-size: 0.85rem; transition: background 0.15s, color 0.15s;
            text-align: left;
        }
        .lang-option:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
        .lang-option.active { color: var(--accent); font-weight: 600; }

        /* ── Theme Switcher ── */
        .theme-btn {
            display: flex; align-items: center; justify-content: center;
            background: transparent; border: 1px solid var(--border);
            color: var(--text-secondary); border-radius: 0.4rem;
            padding: 0.3rem 0.5rem; cursor: pointer; font-size: 1rem;
            transition: border-color 0.2s, color 0.2s;
        }
        .theme-btn:hover { border-color: var(--accent); color: var(--text-primary); }

        /* ── Update Notification ── */
        .update-badge {
            display: inline-flex; align-items: center; gap: 0.35rem;
            margin-left: 0.8rem; padding: 0.15rem 0.5rem; border-radius: 2rem;
            font-size: 0.65rem; font-weight: 600; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            vertical-align: middle;
        }
        .update-available { 
            background: rgba(255, 107, 107, 0.1); color: #ff8787; 
            border: 1px solid rgba(255, 107, 107, 0.3);
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.1);
        }
        .system-up-to-date { 
            background: rgba(81, 207, 102, 0.05); color: #69db7c; 
            border: 1px solid rgba(81, 207, 102, 0.15);
            opacity: 0.8;
        }
        .update-badge:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-1px);
        }
        .update-available:hover {
            background: rgba(255, 107, 107, 0.2);
            border-color: rgba(255, 107, 107, 0.5);
        }
        .check-failed { 
            background: rgba(255, 146, 0, 0.1); color: #ff9200; 
            border: 1px solid rgba(255, 146, 0, 0.3);
        }
        .update-badge:active { transform: scale(0.95); }
        
        .pulse-dot {
            width: 7px; height: 7px; background: #ff8787; border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.7);
            animation: pulse 2.5s infinite;
        }
        .check-icon { font-size: 0.75rem; margin-top: -1px; }

        @keyframes pulse {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 8px rgba(255, 107, 107, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(255, 107, 107, 0); }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <button class="hamburger-btn" id="hamburger-btn" aria-label="Menu" onclick="toggleMobileNav()">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
                <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
            </svg>
        </button>
        <div class="nav-brand">
            <span class="nav-brand-title">🔍 Log to LLM Sentinel</span>
            <div class="nav-brand-meta">
                <span class="nav-version">v{{ APP_VERSION }}</span>
                <div id="version-update-badge" class="update-badge" onclick="checkAppUpdate()" title="">
                    <span class="check-icon">—</span>
                    <span data-i18n="header.checking"></span>
                </div>
            </div>
        </div>
        <!-- Overlay INSIDE navbar so it shares stacking context with nav-links -->
        <div class="nav-overlay" id="nav-overlay" onclick="toggleMobileNav()"></div>
        <div class="nav-links" id="nav-links">
            <a href="/" data-i18n="nav.dashboard" class="{% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
            <a href="/rules" data-i18n="nav.rules" class="{% if request.url.path == '/rules' %}active{% endif %}">Règles</a>
            <a href="/monitor" data-i18n="nav.monitor" class="{% if request.url.path == '/monitor' %}active{% endif %}">Monitor</a>
            <a href="/chat" data-i18n="nav.chat" class="{% if request.url.path == '/chat' %}active{% endif %}">Log Chat</a>
            <a href="/meta-analysis" data-i18n="nav.meta" class="{% if request.url.path == '/meta-analysis' %}active{% endif %}">Méta-Analyse</a>
            <a href="/config" data-i18n="nav.config" class="{% if request.url.path == '/config' %}active{% endif %}">Configuration</a>
        </div>
        <div class="nav-right">
            <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 0.2rem;">
                <div id="server-time-display" style="font-family: monospace; font-size: 0.75rem; color: var(--text-secondary); margin-right: 0.2rem;" title="Server Time">--:--:--</div>
                <div class="nav-stats" id="nav-system-stats">
                    <div class="stat-item" data-i18n-title="nav.tooltip_cpu" title="Utilisation CPU (App / Système)">
                        <span class="stat-icon">📊</span>
                        <span class="stat-label" data-i18n="nav.cpu_app">App</span>
                        <span id="stat-cpu-app" class="stat-value">--%</span>
                        <span class="stat-sep" style="opacity: 0.3; font-size: 0.75rem;">/</span>
                        <span class="stat-label" data-i18n="nav.cpu_sys">Sys</span>
                        <span id="stat-cpu-sys" class="stat-value">--%</span>
                    </div>
                    <div class="stat-item" data-i18n-title="nav.tooltip_ram" title="Utilisation RAM (App)">
                        <span class="stat-icon">💾</span>
                        <span class="stat-label" data-i18n="nav.ram">RAM</span>
                        <span id="stat-ram" class="stat-value">-- MB</span>
                    </div>
                    <div class="stat-item" data-i18n-title="nav.tooltip_uptime" title="Uptime">
                        <span class="stat-icon">⏱️</span>
                        <span class="stat-label" data-i18n="nav.uptime">Uptime</span>
                        <span id="stat-uptime" class="stat-value">--</span>
                    </div>
                </div>
            </div>
            <button id="theme-toggle-btn" class="theme-btn" onclick="toggleTheme()" data-i18n-title="header.theme_light" title="Passer au thème clair">
                ☀️
            </button>
            <div id="lang-switcher"></div>
        </div>
    </nav>
    <main class="{% block container_class %}container{% endblock %}">
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/js/i18n.js?v=2"></script>
    <script src="/static/js/common.js?v=5"></script>
    <script>
    /* ── Mobile hamburger nav toggle ── */
    function toggleMobileNav() {
        document.getElementById('nav-links').classList.toggle('open');
        document.getElementById('nav-overlay').classList.toggle('open');
    }
    /* Close nav on link click */
    document.querySelectorAll?.call(document, '.nav-links a')?.forEach(a => {
        a.addEventListener('click', () => {
            document.getElementById('nav-links')?.classList.remove('open');
            document.getElementById('nav-overlay')?.classList.remove('open');
        });
    });
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            document.getElementById('nav-links')?.classList.remove('open');
            document.getElementById('nav-overlay')?.classList.remove('open');
        }
    });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
