{% extends "base.html" %}

{% block title %}Méta-Analyse — Log to LLM Sentinel{% endblock %}

{% block scripts %}
<script src="/static/js/meta.js?v=3"></script>
<style>
/* Spécifique à Méta Analyse */
.rule-checkbox-list {
    max-height: 150px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.5rem;
    background: rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    gap: 0.1rem;
}
.rule-checkbox-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.3rem 0.4rem;
    border-radius: 3px;
    width: 100%;
    transition: background 0.15s;
}
.rule-checkbox-item:hover {
    background: rgba(255,255,255,0.05);
}
.rule-checkbox-item input[type='checkbox'] {
    flex-shrink: 0;
    width: 14px;
    height: 14px;
    cursor: pointer;
    accent-color: var(--accent);
}
.rule-checkbox-item label {
    flex: 1;
    margin: 0;
    cursor: pointer;
    font-size: 0.88rem;
    color: var(--text-primary);
}
.schedule-group {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1rem;
    margin-bottom: 1rem;
}
.context-preview-box {
    width: 100%;
    height: 300px;
    font-family: 'Consolas', monospace;
    font-size: 0.8rem;
    background: #1e1e1e;
    color: #d4d4d4;
    border: 1px solid #333;
    padding: 0.5rem;
    border-radius: 4px;
    margin-bottom: 0.5rem;
    resize: vertical;
    box-sizing: border-box;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
    outline: none;
}
.accordion-header {
    background: rgba(255,255,255,0.03);
    padding: 0.75rem 1rem;
    border-top: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 500;
    transition: background 0.2s;
    user-select: none;
}
.accordion-header:hover {
    background: rgba(255,255,255,0.06);
}
.accordion-content {
    padding: 1rem;
    border-top: 1px solid var(--border);
    display: none;
}
.accordion-content.open {
    display: block;
}
</style>
{% endblock %}

{% block content %}
<div class="header-actions" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <h1 data-i18n="meta.title">Méta-Analyse</h1>
    <button class="btn btn-primary" onclick="openConfigModal()" data-i18n="meta.new_config">+ Nouvelle Configuration</button>
</div>

<!-- Liste Globale -->
<div>
    <h2 data-i18n="meta.configs" style="margin-bottom: 1rem;">Configurations Actives</h2>
    <div id="configs-container" style="display: flex; flex-direction: column; gap: 1.5rem;">
        <div class="loading" data-i18n="common.loading">Chargement...</div>
    </div>
</div>

<!-- Modal Configuration -->
<div id="config-modal" class="modal hidden">
    <div class="modal-content">
        <h2 id="modal-title" data-i18n="meta.modal_title_new">Nouvelle Méta-Analyse</h2>
        <form id="config-form">
            <input type="hidden" id="config-id">
            
            <div class="form-group">
                <label data-i18n="meta.name">Nom de la configuration</label>
                <input type="text" id="config-name" class="form-control" required data-i18n-placeholder="meta.placeholder_name" placeholder="Ex : Synthèse Journalière Production">
            </div>

            <div class="form-group">
                <label data-i18n="meta.rules">Règles cibles (Laissez vide pour inclure toutes les règles)</label>
                <div class="rule-checkbox-list" id="config-rules-list">
                    <!-- Rempli par le JS -->
                </div>
            </div>

            <div class="schedule-group">
                <h4 style="margin-top:0; margin-bottom: 0.75rem; color: var(--text-primary);" data-i18n="meta.schedule_planning">Planification</h4>
                <div class="row">
                    <div class="col">
                        <label data-i18n="meta.schedule_type">Fréquence</label>
                        <select id="config-schedule-type" class="form-control" onchange="updateScheduleUI()">
                            <option value="daily" data-i18n="meta.schedule_daily">Tous les jours</option>
                            <option value="weekly" data-i18n="meta.schedule_weekly">Toutes les semaines</option>
                            <option value="monthly" data-i18n="meta.schedule_monthly">Tous les mois</option>
                        </select>
                    </div>
                    <div class="col" id="schedule-day-container" style="display: none;">
                        <label id="schedule-day-label" data-i18n="meta.schedule_day">Jour</label>
                        <select id="config-schedule-day" class="form-control">
                            <!-- Rempli dynamiquement par JS -->
                        </select>
                    </div>
                    <div class="col">
                        <label data-i18n="meta.schedule_hour">Heure</label>
                        <input type="time" id="config-schedule-time" class="form-control" value="00:00" required>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <div class="form-group">
                        <label data-i18n="meta.context_size_label">Taille du contexte (tokens)</label>
                        <select id="config-context" class="form-control">
                            <option value="2048" data-i18n="meta.ctx_quick">2048 (Résumé rapide)</option>
                            <option value="4096" data-i18n="meta.ctx_standard">4096 (Standard)</option>
                            <option value="8192" data-i18n="meta.ctx_large">8192 (Contexte large)</option>
                            <option value="16384" selected data-i18n="meta.ctx_xlarge">16384 (Très large)</option>
                            <option value="32768" data-i18n="meta.ctx_massive">32768 (Massif - Attention RAM)</option>
                        </select>
                    </div>
                </div>
                <div class="col">
                    <div class="form-group">
                        <label data-i18n="meta.max_analyses_label">Limite d'analyses incluses</label>
                        <input type="number" id="config-max" class="form-control" value="50" min="5" required>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label data-i18n="meta.system_prompt">Prompt Système IA</label>
                <textarea id="config-prompt" class="form-control" rows="3" required></textarea>
            </div>

            <div class="form-group" style="display: flex; gap: 1rem; align-items: center;">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                    <input type="checkbox" id="config-enabled" checked>
                    <span data-i18n="meta.enabled">Activé</span>
                </label>
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                    <input type="checkbox" id="config-notify" checked>
                    <span data-i18n="meta.notify">Notifier à la fin</span>
                </label>
            </div>

            <div class="form-actions" style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem;">
                <button type="button" class="btn btn-secondary" onclick="closeConfigModal()" data-i18n="common.cancel">Annuler</button>
                <button type="submit" class="btn btn-primary" data-i18n="common.save">Enregistrer</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
