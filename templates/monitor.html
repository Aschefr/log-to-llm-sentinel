{% extends "base.html" %}

{% block title %}Monitor — Log to LLM Sentinel{% endblock %}

{% block content %}
<div class="monitor-page">
    <div class="page-header">
        <h1><span aria-hidden="true">🔬 </span><span data-i18n="monitor.title">Monitor</span></h1>
        <div class="monitor-search-bar">
            <input type="text" id="monitor-search-id" data-i18n-placeholder="monitor.search_placeholder" placeholder="🔍 Rechercher par ID de détection..." autocomplete="off">
            <button class="btn btn-secondary btn-sm" id="monitor-search-btn" data-i18n="monitor.search_btn">Rechercher</button>
        </div>
    </div>

    <!-- Résultat de recherche par ID -->
    <div id="search-result" class="search-result-panel hidden"></div>

    <!-- Onglets par règle -->
    <div class="monitor-tabs-wrapper">
        <div class="monitor-tabs" id="monitor-tabs">
            <div class="loading">Chargement des règles...</div>
        </div>
    </div>

    <!-- Contenu de l'onglet actif -->
    <div id="monitor-tab-content" class="monitor-tab-content"></div>
</div>

<!-- Modal ajout/édition de règle (shared partial) -->
{% include '_rule_modal.html' %}
{% endblock %}

{% block scripts %}
<script src="/static/js/rule_modal.js?v=1"></script>
<script src="/static/js/keyword_wizard.js?v=7"></script>
<script src="/static/js/monitor.js?v=6"></script>

{% endblock %}
