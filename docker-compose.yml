# ==============================================================================
# LOG TO LLM SENTINEL - CONFIGURATION UNIVERSELLE
# ==============================================================================

services:
  sentinel:
    build: .
    container_name: log-sentinel
    ports:
      - 10911:10911
    volumes:
      # 1. Donnees de l'application (Base de donnees, sessions)
      - ./data:/app/data
      # 2. Dossier de logs partage (contient aussi l'export du journal systeme)
      - ./logs:/logs
      # 3. Acces aux logs Docker (facultatif mais recommande)
      - /var/lib/docker/:/docker-logs:ro
      # 4. Acces aux logs systemes classiques (/var/log/syslog, auth.log, etc.)
      - /var/log:/system-logs:ro
      # Accès log nextcloud
      - /var/lib/docker/volumes/nextcloud_aio_nextcloud_data/_data/:/nextcloud-data:ro
    environment:
      - PYTHONUNBUFFERED=1
      # IMPORTANT : Listez ici tous les chemins (cote conteneur) que l'UI doit explorer.
      - SENTINEL_BROWSE_ROOTS=/logs,/app/data,/docker-logs,/system-logs,/nextcloud-data
    restart: unless-stopped

  # ==============================================================================
  # EXPORTATEUR JOURNALD (UNIVERSEL)
  # Ce service transforme le journal binaire Linux en fichier texte pour Sentinel.
  # Aucun changement n'est requis sur votre systeme hote.
  # ==============================================================================
  system-journal-exporter:
    image: ubuntu:24.04
    container_name: log-sentinel-journal-bridge
    command: |
      bash -c "apt-get update && apt-get install -y systemd && 
               journalctl -f -n 100 > /logs/host_system_journal.log"
    volumes:
      # Points de montage necessaires pour acceder au journal systeme de l'hote
      - /var/log/journal:/var/log/journal:ro
      - /run/systemd/journal:/run/systemd/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      # On ecrit le flux texte dans le dossier partage avec Sentinel
      - ./logs:/logs
    restart: unless-stopped

  # ==============================================================================
  # NOTES : OLLAMA (OPTIONNEL)
  # ==============================================================================
  # Si votre instance Ollama n'est pas sur une autre machine, vous pouvez
  # l'ajouter ici. Décommentez les lignes ci-dessous pour l'activer.
  #
  # --- NOTE SUR FLASH ATTENTION ---
  # Flash Attention est conçu pour optimiser les accès à la mémoire SRAM des GPU Nvidia.
  # Sur GPU : Accélère massivement le calcul de l'attention.
  # Sur CPU (AMD/ARM) : Les architectures CPU gèrent le cache différemment. (déconseillé) 
  #--- NOTE SUR KV CACHE ---
  # KV Cache type : q8_0 permet de réduire l'usage RAM sans perte de précision notable.
  #
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-server
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    environment:
      - OLLAMA_KV_CACHE_TYPE=q8_0
    #     - OLLAMA_FLASH_ATTENTION=1 
    restart: unless-stopped

volumes:
  ollama_data:
