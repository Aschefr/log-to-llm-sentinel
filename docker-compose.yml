# ==============================================================================
# LOG TO LLM SENTINEL - UNIVERSAL CONFIGURATION
# ==============================================================================

services:
  sentinel:
    # Build from current directory (uses Dockerfile)
    build: .
    container_name: log-to-llm-sentinel
    ports:
      - 10911:10911 # Web interface access
    volumes:
      # 1. MANDATORY: Application data (database, settings, history)
      # WARNING: DO NOT REMOVE THIS VOLUME!
      - ./data:/app/data
      # 2. Shared logs folder (used for binary log exports and temp files)
      - ./logs:/logs
      # 3. Optional: Access to Docker container logs
      - /var/lib/docker/:/docker-logs:ro
      # 4. Optional: Access to standard system logs (syslog, auth.log, etc.)
      - /var/log:/system-logs:ro
    environment:
      - PYTHONUNBUFFERED=1
      # IMPORTANT: List all container paths that the UI file browser should explore.
      - SENTINEL_BROWSE_ROOTS=/logs,/app/data,/docker-logs,/system-logs
    restart: unless-stopped

  # ==============================================================================
  # SYSTEM JOURNAL BRIDGE (OPTIONAL)
  # This service exports binary Linux Systemd logs into text for Sentinel.
  # No changes are required on your host system.
  # ==============================================================================
  system-journal-exporter:
    image: ubuntu:24.04
    container_name: log-to-llm-sentinel-journal-bridge
    command: |
      bash -c "apt-get update && apt-get install -y systemd && 
               journalctl -f -n 100 > /logs/host_system_journal.log"
    volumes:
      # Necessary mount points to access the host's system journal
      - /var/log/journal:/var/log/journal:ro
      - /run/systemd/journal:/run/systemd/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      # Writes the log stream to the shared folder with Sentinel
      - ./logs:/logs
    restart: unless-stopped

  # ==============================================================================
  # OPTIONAL: OLLAMA LOCAL AI SERVER
  # ==============================================================================
  # If you don't have an Ollama instance on another machine, you can
  # enable it here. Uncomment the lines below to activate.
  #
  # --- NOTE ON FLASH ATTENTION ---
  # Only for Nvidia GPUs. Massively accelerates attention computation.
  # Not recommended for CPUs (AMD/ARM).
  #
  # --- NOTE ON KV CACHE ---
  # type: q8_0 reduces RAM usage with minimal precision loss.
