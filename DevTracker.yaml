# ─────────────────────────────────────────────
# INVESTIGATIONS & BUGFIXES
# ─────────────────────────────────────────────
bugs:
  - id: BUG-01
    name: "Nextcloud logs: Massive single-line concatenation on restart"
    status: DONE
    effort: M
    priority: P0
    notes: |
      Symptom: After `compose down`, `git pull`, `compose up -d --build`, the real-time view shows a single line
      of thousands of characters (looks like a concatenation of all lines).
      Root cause: last_position persisted in DB survives restart. If log file recreated (new inode) but already
      bigger than old position → seek lands mid-line → everything to next \n = mega-line.
      Fix: inode tracking in LogWatcher detects file recreation → resets position.
      Protection: MAX_LINE_LENGTH=10,000 at 3 layers (LogWatcher, tail API, Orchestrator).
    subtasks:
      - id: BUG-01a
        name: "Investigate LogWatcher line splitting and position reset logic"
        status: DONE
        notes: "Added inode tracking to detect file recreation (inode change = reset position to 0)"
      - id: BUG-01b
        name: "Add protection: Limit max characters per line in LogWatcher"
        status: DONE
        notes: "MAX_LINE_LENGTH=10,000. Truncated lines get …[TRUNCATED: N chars] suffix"
      - id: BUG-01c
        name: "Add protection: Skip AI analysis for oversized lines"
        status: DONE
        notes: "Defense-in-depth guard in Orchestrator.handle_new_lines() + tail API truncation"
      - id: BUG-01d
        name: "Investigate if Nextcloud startup logs have weird encoding or lack of newlines"
        status: DONE
        notes: "Root cause = stale last_position + file recreation, not encoding. Nextcloud uses single-line JSON objects which are fine when position tracking works correctly."

  - id: BUG-02
    name: "Spurious 'Auto-learning started' notification when updating rule during active session"
    status: DONE
    effort: S
    priority: P2
    notes: |
      Symptom: While auto-learning is active, opening the settings modal, changing any value, and clicking 
      "Update" triggers an unwanted "Auto-learning started" notification.
      Expected: Saving rule settings should not trigger a start notification if a session is already in progress.
      Root cause: Modal save button probably calls _launchSession or similar logic that sends the notification 
      without checking if it's a re-save of an active session.
      Fix: Updated kwTabSwitch and _updateLaunchBtn in keyword_wizard.js to show the normal Save button when a session is active.

  - id: BUG-03
    name: "The notification message must have the name of the current log to llm sentinel instance"
    status: DONE
    effort: S
    priority: P0
    notes: |
      The instance name is defined in the config page. It must appears in all notifications.
      Fix: Added instance_name prefix to subjects in _send_notification of keyword_learning_service.py.

  - id: BUG-04
    name: "The list of refined keywords must be shown in notification message during the retry sessions"
    status: DONE
    effort: S
    priority: P0
    notes: |
      Currently the firt refinement shows the list of keywords. If the first is rejected, the refined keywords are not shown in the notification.

  - id: BUG-05
    name: "Configuration, Ollama section, in the model list, the option 'Other' doesn't have a proper text and is visible as 'config.option_option'"
    status: DONE
    effort: S
    priority: P0