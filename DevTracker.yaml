# ─────────────────────────────────────────────
# GLOBAL RULES (apply to ALL tasks)
# ─────────────────────────────────────────────
global_rules:
  - id: G-01
    rule: "Use existing i18n system. Check for duplicate keys before adding."
  - id: G-02
    rule: "Decorative icons hardcoded. Only text in JSON lang files."
  - id: G-03
    rule: "Interface with existing debug system. Add filters as needed."
  - id: G-04
    rule: "Debug logs in French (dev language)."
  - id: G-05
    rule: "Preserve existing visual style: badges, colors, fonts."
  - id: G-06
    rule: "Auto-refresh individuals elements. No F5 needed."
  - id: G-07
    rule: |
      NEVER use PowerShell Set-Content / Get-Content to modify i18n JSON files.
      PowerShell reads UTF-8 files as Windows-1252 by default → double-encodes accented chars.
      ALWAYS use Python with encoding='utf-8-sig' (fr.json has BOM).
      Repair tool: scratch/fix_i18n.py — run it, then docker compose restart sentinel.
      Example safe write:
        with open('static/i18n/fr.json', 'r', encoding='utf-8-sig') as f: content = f.read()
        # ... modify content ...
        with open('static/i18n/fr.json', 'w', encoding='utf-8-sig', newline='') as f: f.write(content)
  - id: G-08
    rule: "NEVER use the native window.confirm() box. ALWAYS use the custom UI modal `showInlineConfirm(btnElement, message, callback)` from common.js for any user confirmation."
  - id: G-09
    rule: "Notification templates now follow the site language (GlobalConfig.site_lang).
      IMPORTANT for future devs: when adding new notifications, use the backend i18n helper:
        from app.utils.notification_i18n import nt
        lang = config.site_lang or 'fr'  # (or global_cfg.site_lang)
        subject = nt('your_key', lang)
      To add a new translated string: add the key in the 'notifications' section of the language JSON files in static/i18n/ (e.g., en.json, fr.json).
      The site language is synced from the frontend header to GlobalConfig.site_lang via PUT /api/config/site-lang."
  - id: G-10
    rule: |
      When adding a new column to any SQLAlchemy model, ALWAYS add a corresponding
      ALTER TABLE migration in app/database.py init_db() migrations list.
      SQLAlchemy create_all() does NOT add columns to existing tables.
      Without this, existing databases will crash on startup after update.
      Format: "ALTER TABLE <table> ADD COLUMN <name> <TYPE> DEFAULT <value>"


